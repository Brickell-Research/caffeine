name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v5.6.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  # Bun version is coupled to the --bytecode flag in the build step:
  # bytecode is per-Bun-version, so bumping this requires re-testing the
  # produced binary still launches.
  BUN_VERSION: "1.3.14"
  GLEAM_VERSION: "1.16.0"
  OTP_VERSION: "27"
  REBAR3_VERSION: "3.25.0"

jobs:
  build:
    name: Compile ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        target:
          - { name: linux-x64, bun_target: bun-linux-x64, ext: "" }
          - { name: linux-arm64, bun_target: bun-linux-arm64, ext: "" }
          - { name: macos-x64, bun_target: bun-darwin-x64, ext: "" }
          - { name: macos-arm64, bun_target: bun-darwin-arm64, ext: "" }
          - { name: windows-x64, bun_target: bun-windows-x64, ext: ".exe" }
    env:
      TAG: ${{ inputs.tag || github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}
          persist-credentials: false

      - name: Setup BEAM (Erlang + Gleam)
        uses: erlef/setup-beam@e6d7c94229049569db56a7ad5a540c051a010af9 # v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          gleam-version: ${{ env.GLEAM_VERSION }}
          rebar3-version: ${{ env.REBAR3_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install npm dependencies
        run: bun install

      - name: Build Gleam to JavaScript
        run: |
          cd caffeine_lsp && gleam build --target javascript
          cd ../caffeine_cli && gleam build --target javascript

      - name: Extract version
        id: version
        run: |
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compile binary
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist
          echo "Bun version: $(bun --version)"
          # --minify: strip whitespace + dead code + constant fold
          # --bytecode: pre-compile to JSC bytecode (~1.8x faster CLI cold-start,
          #   verified locally on Bun 1.3.14; +~7% binary size).
          # --no-compile-autoload-*: skip .env / bunfig.toml lookups at startup;
          #   caffeine reads neither.
          bun build --compile --minify --bytecode \
            --no-compile-autoload-dotenv --no-compile-autoload-bunfig \
            --target=${{ matrix.target.bun_target }} \
            --outfile "dist/caffeine-${VERSION}-${{ matrix.target.name }}${{ matrix.target.ext }}" \
            main.mjs
          ls -la dist/

      - name: Smoke test (Linux x64 only)
        if: matrix.target.name == 'linux-x64'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: ./dist/caffeine-${VERSION}-linux-x64 --help | head -5

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: caffeine-${{ steps.version.outputs.version }}-${{ matrix.target.name }}
          path: dist/caffeine-${{ steps.version.outputs.version }}-${{ matrix.target.name }}${{ matrix.target.ext }}
          if-no-files-found: error
          retention-days: 1

  finalize:
    name: Package and Release
    needs: build
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag || github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Extract version
        id: version
        run: |
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Generate release notes
        id: release_notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)
          if [ -z "$PREV_TAG" ]; then
            echo "## What's New in Caffeine v${VERSION}" > dist/release-notes.md
          else
            ./scripts/generate-release-notes.sh "$TAG" "$PREV_TAG" > dist/release-notes.md
          fi
          cat dist/release-notes.md

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List downloaded binaries
        run: ls -la dist/

      - name: Create archives
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd dist
          tar -czvf caffeine-${VERSION}-linux-x64.tar.gz caffeine-${VERSION}-linux-x64
          tar -czvf caffeine-${VERSION}-linux-arm64.tar.gz caffeine-${VERSION}-linux-arm64
          tar -czvf caffeine-${VERSION}-macos-x64.tar.gz caffeine-${VERSION}-macos-x64
          tar -czvf caffeine-${VERSION}-macos-arm64.tar.gz caffeine-${VERSION}-macos-arm64
          zip caffeine-${VERSION}-windows-x64.zip caffeine-${VERSION}-windows-x64.exe

      - name: Generate SHA256 checksums
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd dist
          sha256sum \
            caffeine-${VERSION}-linux-x64.tar.gz \
            caffeine-${VERSION}-linux-arm64.tar.gz \
            caffeine-${VERSION}-macos-x64.tar.gz \
            caffeine-${VERSION}-macos-arm64.tar.gz \
            caffeine-${VERSION}-windows-x64.zip \
            > caffeine-${VERSION}-checksums.sha256

      - name: Check if release exists
        id: check_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$TAG" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ env.TAG }}
          body_path: dist/release-notes.md
          files: |
            dist/caffeine-${{ steps.version.outputs.version }}-linux-x64.tar.gz
            dist/caffeine-${{ steps.version.outputs.version }}-linux-arm64.tar.gz
            dist/caffeine-${{ steps.version.outputs.version }}-macos-x64.tar.gz
            dist/caffeine-${{ steps.version.outputs.version }}-macos-arm64.tar.gz
            dist/caffeine-${{ steps.version.outputs.version }}-windows-x64.zip
            dist/caffeine-${{ steps.version.outputs.version }}-checksums.sha256

      - name: Send release notification
        if: steps.check_release.outputs.exists == 'false'
        continue-on-error: true
        env:
          NOTIFICATIONS_API_KEY: ${{ secrets.NOTIFICATIONS_API_KEY }}
          NOTIFICATIONS_URL: ${{ secrets.NOTIFICATIONS_URL }}
        run: |
          VERSION="${TAG#v}"
          BODY=$(cat dist/release-notes.md)
          curl -s -X POST "${NOTIFICATIONS_URL}/send-blast" \
            -H "X-API-Key: ${NOTIFICATIONS_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg subject "Caffeine v${VERSION} Released" --arg body "$BODY" '{subject: $subject, body: $body}')"

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.GH_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          SHA_MACOS_X64=$(sha256sum dist/caffeine-${VERSION}-macos-x64.tar.gz | cut -d' ' -f1)
          SHA_MACOS_ARM64=$(sha256sum dist/caffeine-${VERSION}-macos-arm64.tar.gz | cut -d' ' -f1)
          SHA_LINUX_X64=$(sha256sum dist/caffeine-${VERSION}-linux-x64.tar.gz | cut -d' ' -f1)

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/brickell-research/homebrew-caffeine.git" tap
          cd tap

          cat > Formula/caffeine_lang.rb << 'FORMULA_END'
          class CaffeineLang < Formula
            desc "Caffeine programming language"
            homepage "https://caffeine-lang.run"
            license "GPL-3.0-only"
          FORMULA_END

          sed -i "s/license \"GPL-3.0-only\"/license \"GPL-3.0-only\"\n  version \"${VERSION}\"/" Formula/caffeine_lang.rb

          cat >> Formula/caffeine_lang.rb << FORMULA_END

            # Platform-specific downloads — binaries hosted on the caffeine repo
            if OS.mac? && Hardware::CPU.intel?
              url "https://github.com/Brickell-Research/caffeine/releases/download/v${VERSION}/caffeine-${VERSION}-macos-x64.tar.gz"
              sha256 "${SHA_MACOS_X64}"
            elsif OS.mac? && Hardware::CPU.arm?
              url "https://github.com/Brickell-Research/caffeine/releases/download/v${VERSION}/caffeine-${VERSION}-macos-arm64.tar.gz"
              sha256 "${SHA_MACOS_ARM64}"
            elsif OS.linux? && Hardware::CPU.intel?
              url "https://github.com/Brickell-Research/caffeine/releases/download/v${VERSION}/caffeine-${VERSION}-linux-x64.tar.gz"
              sha256 "${SHA_LINUX_X64}"
            end

            def install
              if OS.mac? && Hardware::CPU.intel?
                bin.install "caffeine-#{version}-macos-x64" => "caffeine"
              elsif OS.mac? && Hardware::CPU.arm?
                bin.install "caffeine-#{version}-macos-arm64" => "caffeine"
              elsif OS.linux? && Hardware::CPU.intel?
                bin.install "caffeine-#{version}-linux-x64" => "caffeine"
              end
            end

            test do
              system "#{bin}/caffeine"
            end
          end
          FORMULA_END

          sed -i 's/^        //' Formula/caffeine_lang.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Formula/caffeine_lang.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula already up to date"
          else
            git commit -m "Update caffeine to ${VERSION}"
            git push origin main
          fi
